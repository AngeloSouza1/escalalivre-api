# fly.toml app configuration file generated for escalalivre-api on 2026-03-11T20:34:14-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'escalalivre-api'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
